<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Close — Competitive Intelligence</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css"
    />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: 'DM Sans', sans-serif;
        background: #f5f4f0;
        color: #2c2c2a;
        min-height: 100vh;
      }
      #root { max-width: 860px; margin: 0 auto; padding: 0 20px 60px; }

      /* CSS variables matching the dashboard design */
      :root {
        --color-background-primary: #ffffff;
        --color-background-secondary: #f1efe8;
        --color-background-tertiary: #f5f4f0;
        --color-background-info: #e6f1fb;
        --color-background-success: #eaf3de;
        --color-background-warning: #faeeda;
        --color-background-danger: #fcebeb;
        --color-text-primary: #2c2c2a;
        --color-text-secondary: #5f5e5a;
        --color-text-tertiary: #888780;
        --color-text-info: #185fa5;
        --color-text-success: #3b6d11;
        --color-text-warning: #854f0b;
        --color-text-danger: #a32d2d;
        --color-border-tertiary: rgba(44,44,42,0.15);
        --color-border-secondary: rgba(44,44,42,0.3);
        --color-border-primary: rgba(44,44,42,0.4);
        --color-border-info: #185fa5;
        --border-radius-md: 8px;
        --border-radius-lg: 12px;
        --border-radius-xl: 16px;
        --font-sans: 'DM Sans', sans-serif;
        --font-mono: 'DM Mono', monospace;
      }

      @media (prefers-color-scheme: dark) {
        body { background: #1a1a18; color: #e8e6df; }
        :root {
          --color-background-primary: #242422;
          --color-background-secondary: #2c2c2a;
          --color-background-tertiary: #1a1a18;
          --color-background-info: #042c53;
          --color-background-success: #173404;
          --color-background-warning: #412402;
          --color-background-danger: #501313;
          --color-text-primary: #e8e6df;
          --color-text-secondary: #b4b2a9;
          --color-text-tertiary: #888780;
          --color-text-info: #85b7eb;
          --color-text-success: #97c459;
          --color-text-warning: #ef9f27;
          --color-text-danger: #f09595;
          --color-border-tertiary: rgba(232,230,223,0.15);
          --color-border-secondary: rgba(232,230,223,0.3);
          --color-border-primary: rgba(232,230,223,0.4);
          --color-border-info: #85b7eb;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
