<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Competitive Intel · Close</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.11.0/dist/tabler-icons.min.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      :root {
        /* Close brand */
        --close-green:  #3CC88A;
        --close-blue:   #4B9EFF;
        --close-yellow: #F5C842;

        /* Dark theme */
        --color-background-primary:   #1C1C1E;
        --color-background-secondary: #2C2C2E;
        --color-background-tertiary:  #141414;
        --color-background-info:      rgba(75,158,255,0.12);
        --color-background-success:   rgba(60,200,138,0.12);
        --color-background-warning:   rgba(245,200,66,0.12);
        --color-background-danger:    rgba(255,80,80,0.12);
        --color-text-primary:         #F5F5F5;
        --color-text-secondary:       #A0A0A8;
        --color-text-tertiary:        #636368;
        --color-text-info:            #4B9EFF;
        --color-text-success:         #3CC88A;
        --color-text-warning:         #F5C842;
        --color-text-danger:          #FF6B6B;
        --color-border-tertiary:      rgba(255,255,255,0.06);
        --color-border-secondary:     rgba(255,255,255,0.10);
        --color-border-primary:       rgba(255,255,255,0.18);
        --color-border-info:          #4B9EFF;
        --border-radius-md:           6px;
        --border-radius-lg:           10px;
        --border-radius-xl:           14px;
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      }

      html { color-scheme: dark; }

      body {
        font-family: var(--font-sans);
        background: #0F0F0F;
        color: var(--color-text-primary);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      /* Top nav */
      #app-nav {
        position: sticky;
        top: 0;
        z-index: 100;
        background: #111111;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        padding: 0 28px;
        height: 52px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      #app-nav .nav-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .close-wordmark {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .close-wordmark span {
        font-size: 16px;
        font-weight: 700;
        color: #FFFFFF;
        letter-spacing: -0.03em;
      }

      .nav-divider {
        width: 1px;
        height: 16px;
        background: rgba(255,255,255,0.15);
      }

      .nav-title {
        font-size: 13px;
        font-weight: 500;
        color: rgba(255,255,255,0.5);
      }

      .nav-badge {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 8px;
        border-radius: 20px;
        background: rgba(60,200,138,0.15);
        color: #3CC88A;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        border: 1px solid rgba(60,200,138,0.25);
      }

      #root {
        max-width: 920px;
        margin: 0 auto;
        padding: 28px 20px 80px;
      }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    </style>
  </head>
  <body>
    <nav id="app-nav">
      <div class="nav-left">
        <div class="close-wordmark">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="12" cy="12" rx="4.2" ry="9.2" stroke="#3CC88A" stroke-width="1.7" transform="rotate(0 12 12)"/>
            <ellipse cx="12" cy="12" rx="4.2" ry="9.2" stroke="#4B9EFF" stroke-width="1.7" transform="rotate(60 12 12)"/>
            <ellipse cx="12" cy="12" rx="4.2" ry="9.2" stroke="#F5C842" stroke-width="1.7" transform="rotate(120 12 12)"/>
          </svg>
          <span>Close</span>
        </div>
        <div class="nav-divider"></div>
        <span class="nav-title">Competitive Intelligence</span>
        <span class="nav-badge">Internal</span>
      </div>
    </nav>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
